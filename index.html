<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- 카톡 미리보기 -->
  <meta property="og:title" content="강신엽, 김태린 결혼합니다♥">
  <meta property="og:description" content="2026.06.06 (토) 17:30\n더 아리엘 6층 스카이가든홀">
  <meta property="og:image" content="https://mcard-resources.barunsoncard.com/upload/invitation/260408/1176773/gallery/0e71015a-b03b-4186-b928-a3f089d03e85.jpg">

  <title>소중한 날 함께해 주세요</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #cover {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://mcard-resources.barunsoncard.com/upload/invitation/260408/1176773/gallery/0e71015a-b03b-4186-b928-a3f089d03e85.jpg') center/cover no-repeat;
      opacity: 1;
      transition: opacity 1s ease;
    }

    .fade-out {
      opacity: 0;
    }
  </style>
</head>

<body>

<div id="cover"></div>

<script>
  const cover = document.getElementById('cover');

  setTimeout(() => {
    cover.classList.add('fade-in');
  }, 200);

  setTimeout(() => {
    cover.classList.remove('fade-in');
    cover.classList.add('fade-out');
  }, 1600);

  setTimeout(() => {
    window.location.href = "https://mcard.barunsoncard.com/m/vtkepy554917";
  }, 2300);
</script>

</body>
</html>
